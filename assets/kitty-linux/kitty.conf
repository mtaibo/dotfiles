# Fonts
font_family      FiraCode Nerd Font Mono
font_size        15.0
disable_ligatures never

# Window and borders
window_padding_width 15
hide_window_decorations yes
confirm_os_window_close 0

# Backend
linux_display_server wayland

# Tokyo night colors
